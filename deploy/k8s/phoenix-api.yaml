apiVersion: apps/v1
kind: Deployment
metadata:
  name: phoenix-api
  namespace: phoenix
spec:
  replicas: 3
  selector:
    matchLabels:
      app: phoenix-api
  template:
    metadata:
      labels:
        app: phoenix-api
    spec:
      containers:
      - name: phoenix-api
        image: phoenix-api:latest
        ports:
        - containerPort: 8080
        env:
        - name: PHOENIX_ENV
          value: "production"
        - name: PHOENIX_PORT
          value: "8080"
        - name: PHOENIX_DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: phoenix-secrets
              key: database-url
        - name: PHOENIX_REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: phoenix-config
              key: redis-url
        livenessProbe:
          httpGet:
            path: /api/system/health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /api/system/health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: phoenix-api-svc
  namespace: phoenix
spec:
  selector:
    app: phoenix-api
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
  type: ClusterIP
