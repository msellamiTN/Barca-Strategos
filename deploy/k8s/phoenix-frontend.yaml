apiVersion: apps/v1
kind: Deployment
metadata:
  name: phoenix-frontend
  namespace: phoenix
spec:
  replicas: 2
  selector:
    matchLabels:
      app: phoenix-frontend
  template:
    metadata:
      labels:
        app: phoenix-frontend
    spec:
      containers:
      - name: phoenix-frontend
        image: phoenix-frontend:latest
        ports:
        - containerPort: 3000
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: phoenix-frontend-svc
  namespace: phoenix
spec:
  selector:
    app: phoenix-frontend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
  type: ClusterIP
