apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: phoenix-ingress
  namespace: phoenix
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - phoenix.example.com
    secretName: phoenix-tls
  rules:
  - host: phoenix.example.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: phoenix-api-svc
            port:
              number: 80
      - path: /
        pathType: Prefix
        backend:
          service:
            name: phoenix-frontend-svc
            port:
              number: 80
