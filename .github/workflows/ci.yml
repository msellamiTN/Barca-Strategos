name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-go:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version: '1.22'
    - run: go mod tidy
    - run: go vet ./...
    - run: go test ./...

  build-go:
    runs-on: ubuntu-latest
    needs: test-go
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version: '1.22'
    - run: go build -o bin/phoenix-api ./cmd/api
    - uses: docker/build-push-action@v5
      with:
        context: .
        tags: phoenix-api:latest

  build-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
    - run: cd frontend && npm ci
    - run: cd frontend && npm run lint
    - run: cd frontend && npm run build
    - uses: docker/build-push-action@v5
      with:
        context: frontend
        tags: phoenix-frontend:latest
